<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMS Platform</title>
  <link rel="stylesheet" href="lms/core/styles.css" />
</head>
<body>

  <!-- ①  Fields landing ─────────────────────────────────────────────────────
       Shown when activeFieldId is null (i.e. no field has been entered yet).
       Hidden by renderShell(); revealed by renderFieldsLanding() / exitToFields().
  ─────────────────────────────────────────────────────────────────────────── -->
  <div id="fields-landing" class="fields-landing">
    <header class="fields-header">
      <h1 id="fields-brand">LMS<span>·Platform</span></h1>
      <p id="fields-tagline" data-i18n="fields.tagline">Choose a field to begin</p>
    </header>
    <div id="fields-grid" class="fields-grid">
      <!-- Field cards injected by renderFieldsLanding() in app.js -->
    </div>
  </div>

  <!-- ②  App shell ──────────────────────────────────────────────────────────
       Hidden until a field is picked (or when no fields are configured,
       renderShell() shows it immediately on load — backward-compat mode).
  ─────────────────────────────────────────────────────────────────────────── -->
  <div id="app-shell" class="app-shell" hidden>

    <aside class="sidebar">

      <!-- Back to fields (Phase 0) ─────────────────────────────────────── -->
      <button id="btn-back-fields" class="back-btn" type="button">
        ← <span data-i18n="shell.backToFields">Fields</span>
      </button>

      <!-- Brand ──────────────────────────────────────────────────────────── -->
      <div class="brand">
        <h2 id="brand-name">LMS<span>·Platform</span></h2>
        <p  id="brand-subtitle" class="brand-subtitle"></p>
        <!-- Subtitle populated at runtime from active module titles (app.js) -->
      </div>

      <!-- Language switcher (Phase 2) ──────────────────────────────────── -->
      <div class="lang-switcher">
        <button data-lang="en" class="lang-btn active">EN</button>
        <button data-lang="ar" class="lang-btn">AR</button>
      </div>

      <!-- Module navigation ──────────────────────────────────────────────── -->
      <section class="panel-block">
        <div class="panel-title" data-i18n="shell.modulesTitle">Modules</div>
        <nav id="module-nav" class="module-nav">
          <!-- Module buttons injected by renderModuleNav() in app.js -->
        </nav>
      </section>

      <!-- Lesson navigation ──────────────────────────────────────────────── -->
      <section class="panel-block">
        <div class="panel-title" data-i18n="shell.lessonsTitle">Lessons</div>
        <nav id="lesson-nav" class="lesson-nav">
          <!-- Lesson buttons injected by renderLessonNav() in app.js -->
        </nav>
      </section>

      <!-- Progress stats ─────────────────────────────────────────────────── -->
      <section class="panel-block stats-block">
        <div id="progress-bars">
          <!-- Progress rows injected by renderProgressBars() in app.js -->
        </div>
      </section>

      <!-- ③  Auth panel (Phase 3) ──────────────────────────────────────────
           Toggled by app.js based on onAuthChange():
             • Signed out → #auth-signed-out visible, #auth-signed-in hidden
             • Signed in  → #auth-signed-in visible,  #auth-signed-out hidden
      ─────────────────────────────────────────────────────────────────────── -->
      <section id="auth-panel" class="panel-block">

        <!-- Signed-out view ─────────────────────────────────────────────── -->
        <div id="auth-signed-out">
          <div class="panel-title" data-i18n="auth.signInTitle">Sign in to sync progress</div>

          <!-- Google sign-in button -->
          <button id="btn-google-signin" class="auth-btn google-btn" type="button">
            <!-- Google "G" logo (official brand colours) -->
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.018 17.64 11.71 17.64 9.2z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
              <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            <span data-i18n="auth.googleButton">Continue with Google</span>
          </button>

          <div class="auth-divider" data-i18n="auth.orDivider">or</div>

          <!-- Email / password fields -->
          <input id="auth-email"    type="email"    placeholder="Email"    autocomplete="email" />
          <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />

          <div class="auth-actions">
            <button id="btn-email-signin" type="button" data-i18n="auth.signInButton">Sign in</button>
            <button id="btn-email-signup" type="button" data-i18n="auth.signUpButton">Sign up</button>
          </div>

          <!-- Inline error message (shown by showAuthError() in app.js) -->
          <p id="auth-error" class="auth-error" hidden></p>
        </div>

        <!-- Signed-in view ──────────────────────────────────────────────── -->
        <div id="auth-signed-in" hidden>
          <div class="auth-user">
            <img id="auth-avatar"       src="" alt="" class="auth-avatar" />
            <span id="auth-display-name"></span>
            <span id="auth-tier-badge"  class="tier-badge"></span>
          </div>
          <a id="btn-admin-panel" href="lms/admin/" target="_blank"
             class="admin-link" hidden data-i18n="auth.adminPanel">Admin panel ↗</a>
          <button id="btn-signout" type="button" class="danger-btn" data-i18n="auth.signOut">
            Sign out
          </button>
        </div>

      </section>
      <!-- end #auth-panel ────────────────────────────────────────────────── -->

      <!-- Reset progress (always visible) ───────────────────────────────── -->
      <button id="reset-progress" class="danger-btn" type="button" data-i18n="shell.resetButton">
        Reset all progress
      </button>

    </aside><!-- end .sidebar -->

    <!-- Lesson frame area ─────────────────────────────────────────────────── -->
    <main class="main">

      <!-- Welcome panel — visible until a lesson is loaded ──────────────── -->
      <div id="welcome-panel" class="welcome-panel">
        <h3 id="welcome-heading" data-i18n="welcome.heading">Your learning platform</h3>
        <p  id="welcome-body"    data-i18n="welcome.body">Select a module to begin.</p>
      </div>

      <!-- Lesson iframe ──────────────────────────────────────────────────── -->
      <iframe id="lesson-frame" class="lesson-frame" src="" title="Lesson content"></iframe>

    </main>

  </div><!-- end #app-shell -->

  <!-- Entry point ────────────────────────────────────────────────────────── -->
  <script type="module" src="lms/core/app.js"></script>

</body>
</html>
