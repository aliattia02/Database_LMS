<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Python Fundamentals</title><style>body{font-family:system-ui,sans-serif;margin:0;padding:24px;background:#f8fafc}h1{margin-top:0}.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;max-width:860px}.item{display:flex;align-items:center;gap:10px;margin:10px 0}</style></head><body><div class="card"><h1>Python Fundamentals</h1><p>Starter module pack lesson for the LMS platform.</p><div id="list"></div></div><script>const KEY='lms_python_01_done';const TOPICS=['Variables and naming','Data types','Operators','Type casting','Input/output basics','Practice checklist'];let done={};try{done=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}function save(){localStorage.setItem(KEY,JSON.stringify(done))}const list=document.getElementById('list');TOPICS.forEach((t,i)=>{const id='t'+(i+1);const row=document.createElement('label');row.className='item';row.innerHTML=`<input type="checkbox" ${done[id]?'checked':''}><span>${i+1}. ${t}</span>`;row.querySelector('input').addEventListener('change',e=>{done[id]=e.target.checked;save()});list.appendChild(row)});</script></body></html>
